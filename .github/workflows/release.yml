name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Publish
        run: dotnet publish src/MultiWall/MultiWall.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Package
        run: Compress-Archive -Path publish/* -DestinationPath MultiWall-win-x64.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: MultiWall-win-x64.zip
          generate_release_notes: true
