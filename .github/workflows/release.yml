name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Publish (self-contained)
        run: dotnet publish src/MultiWall/MultiWall.csproj -c Release -r win-x64 --self-contained -o publish/sc

      - name: Publish (framework-dependent)
        run: dotnet publish src/MultiWall/MultiWall.csproj -c Release -r win-x64 -o publish/fd

      - name: Package (self-contained)
        run: Compress-Archive -Path publish/sc/* -DestinationPath MultiWall-win-x64-sc.zip

      - name: Package (framework-dependent)
        run: Compress-Archive -Path publish/fd/* -DestinationPath MultiWall-win-x64-fd.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MultiWall-win-x64-sc.zip
            MultiWall-win-x64-fd.zip
          generate_release_notes: true
