name: Build Windows

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

      - name: Publish
        run: dotnet publish src/MultiWall/MultiWall.csproj -c Release -r win-x64 -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiWall-win-x64
          path: publish/
